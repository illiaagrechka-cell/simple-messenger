<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Простой мессенджер</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    min-height: 100%;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    margin: 0;
    padding: 0;
    color: #24163a;
    background: linear-gradient(160deg, #ff9de2 0%, #a78bfa 42%, #60a5fa 100%);
    background-attachment: fixed;
    min-height: 100vh;
  }

  .site-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    color: #fff;
  }
  .logo-badge {
    width: 42px; height: 42px; border-radius: 14px;
    background: linear-gradient(135deg, #ffd166, #ff6fb0);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    flex-shrink: 0;
  }
  .logo-badge svg { width: 24px; height: 24px; }
  .site-title { font-size: 19px; font-weight: 800; letter-spacing: 0.01em; text-shadow: 0 1px 4px rgba(0,0,0,0.15); }
  .site-subtitle { font-size: 12px; opacity: 0.85; margin-top: -2px; }

  .wrap { max-width: 440px; margin: 0 auto; padding: 0.5rem 1rem 3rem; min-height: 60vh; }

  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 1.5rem;
    box-shadow: 0 10px 35px rgba(60, 20, 90, 0.25);
  }

  h1 { font-size: 21px; font-weight: 800; margin: 0 0 1.25rem; color: #3d1e6d; }
  input {
    width: 100%; padding: 11px 14px; margin-bottom: 12px;
    border: 2px solid #eee0fb; border-radius: 12px; font-size: 15px;
    background: #fbf7ff;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #b57bff; }
  button {
    width: 100%; padding: 11px 14px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, #a259ff, #ff6fb0);
    color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 14px rgba(162, 89, 255, 0.35);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  button:hover { box-shadow: 0 6px 18px rgba(162, 89, 255, 0.45); }
  button:active { transform: scale(0.97); }
  button.secondary {
    background: #f1e9ff; color: #6b3fa0; box-shadow: none;
  }
  .error { color: #d6336c; font-size: 13px; margin-top: 6px; font-weight: 600; }
  .row { display: flex; gap: 8px; }
  .row input { flex: 1; margin-bottom: 0; }
  .row button { width: auto; padding: 11px 18px; white-space: nowrap; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.1rem; }
  .topbar button { width: auto; padding: 7px 14px; font-size: 13px; }
  .muted { color: #8b7aa8; font-size: 13px; }
  .chat-box {
    background: linear-gradient(180deg, #fdf6ff, #f3e8ff);
    border-radius: 18px;
    padding: 1rem; margin-top: 1rem;
    box-shadow: inset 0 0 0 2px #eee0fb;
  }
  .messages {
    display: flex; flex-direction: column; gap: 8px;
    max-height: 340px; overflow-y: auto; margin-bottom: 10px;
    padding-right: 4px;
  }
  .msg { max-width: 75%; }
  .msg.mine { align-self: flex-end; }
  .bubble {
    padding: 8px 12px; border-radius: 14px; font-size: 14px;
    background: #fff; color: #3d1e6d;
    box-shadow: 0 2px 6px rgba(60,20,90,0.08);
  }
  .msg.mine .bubble {
    background: linear-gradient(135deg, #a259ff, #ff6fb0);
    color: #fff;
  }
  .time { font-size: 11px; color: #a993c4; margin-top: 3px; }
  .msg.mine .time { text-align: right; }
  .userlist { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .userlist span {
    padding: 5px 12px; border-radius: 999px;
    background: #f1e9ff; color: #6b3fa0;
    font-size: 13px; cursor: pointer; font-weight: 600;
  }
  .userlist span:hover { background: #e4d3ff; }
  .section-title {
    font-size: 12px; color: #f1e6ff; margin: 0 0 8px 4px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.06em;
    text-shadow: 0 1px 3px rgba(0,0,0,0.15);
  }
  .conv-list { display: flex; flex-direction: column; gap: 6px; }
  .conv-item {
    background: #fff; border-radius: 14px;
    padding: 10px 14px; cursor: pointer;
    box-shadow: 0 3px 10px rgba(60,20,90,0.12);
    border-left: 4px solid #ff8ac4;
    transition: transform 0.1s;
  }
  .conv-item:hover { transform: translateX(2px); background: #fdf6ff; }
  .conv-name { font-size: 14px; font-weight: 800; color: #3d1e6d; }
  .conv-preview {
    font-size: 13px; color: #8b7aa8; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  a.toggle { display:block; text-align:center; margin-top:12px; font-size:13px; color:#7a4fc9; cursor:pointer; font-weight: 600; }
  .auth-card-wrap { padding-top: 1rem; }

  .logo-badge { cursor: pointer; }
  .logo-badge:hover { filter: brightness(1.08); }

  .search-btn {
    margin-left: auto;
    width: 42px; height: 42px; padding: 0; flex-shrink: 0;
    border-radius: 14px;
    background: rgba(255,255,255,0.18);
    box-shadow: none;
    display: flex; align-items: center; justify-content: center;
  }
  .search-btn:hover { background: rgba(255,255,255,0.28); }
  .search-btn svg { width: 20px; height: 20px; }

  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(40, 15, 70, 0.45);
    align-items: center; justify-content: center;
    padding: 20px;
    z-index: 50;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #fff; border-radius: 18px; padding: 1.5rem;
    max-width: 340px; width: 100%;
    box-shadow: 0 20px 50px rgba(40,15,70,0.35);
  }
  .modal-title { font-size: 18px; font-weight: 800; color: #3d1e6d; margin-bottom: 12px; }
  .modal-row { margin-bottom: 8px; }
  .modal-label { display: block; font-size: 11px; color: #8b7aa8; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
  .modal-value { font-size: 14px; color: #3d1e6d; font-weight: 600; }

  .conv-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .conv-item-main { flex: 1; min-width: 0; }
  .conv-delete-btn {
    width: auto; padding: 6px 9px; flex-shrink: 0;
    background: #fdeef4; color: #d6336c; box-shadow: none; font-size: 13px;
  }
  .conv-delete-btn:hover { background: #fbdce9; }

  .msg { display: flex; align-items: flex-end; gap: 6px; }
  .msg.mine { justify-content: flex-end; }
  .msg-content { max-width: 100%; }
  .msg-delete-btn {
    width: auto; padding: 3px 7px; font-size: 11px;
    background: #fdeef4; color: #d6336c; box-shadow: none;
    opacity: 0.75; flex-shrink: 0;
  }
  .msg-delete-btn:hover { opacity: 1; }
</style>
</head>
<body>
<div class="site-header">
  <div class="logo-badge" id="logo-btn" role="button" tabindex="0" aria-label="О разработчике">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 16.5C3 13 6 11 10 11H16C18.5 11 20.5 13 20.5 15.5C20.5 18 18.5 20 16 20H7C4.8 20 3 18.2 3 16.5Z" fill="#5b3a94"/>
      <path d="M6 11C6 8 8 6 11 6H14C15.5 6 16.5 7 16.5 8.5V11H6Z" fill="#7c4fc9"/>
      <circle cx="16.5" cy="15.5" r="1.1" fill="#ffd166"/>
      <circle cx="12.5" cy="15.5" r="1.1" fill="#ffd166"/>
      <circle cx="8.8" cy="15.5" r="1.1" fill="#ffd166"/>
    </svg>
  </div>
  <div class="site-title">Утюг-чат</div>
  <button class="search-btn" id="search-btn" aria-label="Найти пользователя">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="11" cy="11" r="6.5" stroke="#fff" stroke-width="2"/>
      <line x1="15.8" y1="15.8" x2="20.5" y2="20.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>
</div>
<div class="wrap" id="app"></div>

<div id="modal-overlay" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">Об утюге</div>
    <div class="modal-row"><span class="modal-label">Разработчик</span><span class="modal-value">illia.develop</span></div>
    <div class="modal-row"><span class="modal-label">Контактный email</span><span class="modal-value">illiaa.grechka@gmail.com</span></div>
    <button id="modal-close-btn" class="secondary" style="margin-top:14px;">Закрыть</button>
  </div>
</div>

<div id="search-modal-overlay" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">Написать пользователю</div>
    <input id="search-peer-input" placeholder="имя пользователя" />
    <div id="search-error" class="error"></div>
    <div class="row" style="margin-top:6px;">
      <button id="search-open-btn">Открыть чат</button>
      <button id="search-close-btn" class="secondary">Отмена</button>
    </div>
  </div>
</div>

<script>
const app = document.getElementById('app');
const API = '';
let token = localStorage.getItem('token') || null;
let me = localStorage.getItem('me') || null;
let peer = '';
let pollTimer = null;
let mode = 'login'; // 'login' | 'register'

function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function api(path, options = {}) {
  const headers = Object.assign({ 'Content-Type': 'application/json' }, options.headers || {});
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, Object.assign({}, options, { headers }));
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Ошибка запроса');
  return data;
}

function renderAuth(errorMsg) {
  document.getElementById('search-btn').style.display = 'none';
  const isRegister = mode === 'register';
  app.innerHTML = `
    <div class="auth-card-wrap">
      <div class="card">
        <h1>${isRegister ? 'Регистрация' : 'Вход'}</h1>
        <input id="username" placeholder="имя пользователя" autocomplete="username" />
        <input id="password" type="password" placeholder="пароль" autocomplete="${isRegister ? 'new-password' : 'current-password'}" />
        <button id="submit-btn">${isRegister ? 'Зарегистрироваться' : 'Войти'}</button>
        ${errorMsg ? `<div class="error">${esc(errorMsg)}</div>` : ''}
        <a class="toggle" id="toggle-link">${isRegister ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Зарегистрироваться'}</a>
      </div>
    </div>
  `;
  document.getElementById('toggle-link').onclick = () => { mode = isRegister ? 'login' : 'register'; renderAuth(); };
  document.getElementById('submit-btn').onclick = submitAuth;
  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });
}

async function submitAuth() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  try {
    const data = await api(mode === 'register' ? '/api/register' : '/api/login', {
      method: 'POST',
      body: JSON.stringify({ username, password })
    });
    token = data.token;
    me = data.username;
    localStorage.setItem('token', token);
    localStorage.setItem('me', me);
    renderMain();
  } catch (e) {
    renderAuth(e.message);
  }
}

async function renderMain() {
  document.getElementById('search-btn').style.display = 'flex';
  app.innerHTML = `
    <div class="card">
      <div class="topbar">
        <span class="muted">Вы вошли как <b style="color:#3d1e6d;">${esc(me)}</b></span>
        <button id="logout-btn" class="secondary">Выйти</button>
      </div>

      <div class="section-title" style="color:#8b7aa8;">Чаты</div>
      <div id="conv-list" class="conv-list"></div>

      <div id="chat-area"></div>
    </div>
  `;
  document.getElementById('logout-btn').onclick = () => {
    if (pollTimer) clearInterval(pollTimer);
    localStorage.removeItem('token');
    localStorage.removeItem('me');
    token = null; me = null; peer = '';
    renderAuth();
  };

  await loadConversations();

  if (peer) startChat();
}

async function loadConversations() {
  const box = document.getElementById('conv-list');
  if (!box) return;
  let list = [];
  try {
    list = await api('/api/conversations');
  } catch (e) { return; }

  if (!list.length) {
    box.innerHTML = '<div class="muted">Переписок пока нет — начните новый чат ниже.</div>';
    return;
  }

  box.innerHTML = list.map(c => `
    <div class="conv-item" data-u="${esc(c.username)}">
      <div class="conv-item-main">
        <div class="conv-name">${esc(c.username)}</div>
        <div class="conv-preview">${c.lastFromMe ? 'Вы: ' : ''}${esc(c.lastText)}</div>
      </div>
      <button class="conv-delete-btn" data-u="${esc(c.username)}" title="Удалить чат">✕</button>
    </div>
  `).join('');
  box.querySelectorAll('.conv-item-main').forEach(el => {
    el.onclick = () => {
      peer = el.closest('.conv-item').getAttribute('data-u');
      startChat();
    };
  });
  box.querySelectorAll('.conv-delete-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      deleteConversation(btn.getAttribute('data-u'));
    };
  });
}

async function deleteConversation(withUser) {
  if (!confirm('Удалить весь чат с "' + withUser + '"? Это удалит переписку у обеих сторон.')) return;
  try {
    await api('/api/conversations/' + encodeURIComponent(withUser), { method: 'DELETE' });
    if (peer === withUser) {
      if (pollTimer) clearInterval(pollTimer);
      peer = '';
      document.getElementById('chat-area').innerHTML = '';
    }
    await loadConversations();
  } catch (e) {
    alert(e.message);
  }
}

async function startChat() {
  if (pollTimer) clearInterval(pollTimer);
  document.getElementById('chat-area').innerHTML = `
    <div class="chat-box">
      <div class="muted" style="margin-bottom:10px;">Чат с <b>${esc(peer)}</b></div>
      <div class="messages" id="messages"></div>
      <div class="row">
        <input id="msg-input" placeholder="Написать сообщение..." />
        <button id="send-btn">Отправить</button>
      </div>
    </div>
  `;
  document.getElementById('send-btn').onclick = sendMessage;
  document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  await loadMessages();
  pollTimer = setInterval(loadMessages, 2500);
}

async function loadMessages() {
  const box = document.getElementById('messages');
  if (!box) return;
  let list = [];
  try {
    list = await api('/api/messages/' + encodeURIComponent(peer));
  } catch (e) { return; }
  box.innerHTML = list.map(m => {
    const mine = m.from === me;
    const delBtn = mine ? `<button class="msg-delete-btn" data-id="${esc(m.id)}" title="Удалить сообщение">✕</button>` : '';
    return `<div class="msg ${mine ? 'mine' : ''}">
      ${delBtn}
      <div class="msg-content">
        <div class="bubble">${esc(m.text)}</div>
        <div class="time">${new Date(m.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
      </div>
    </div>`;
  }).join('');
  box.scrollTop = box.scrollHeight;
  box.querySelectorAll('.msg-delete-btn').forEach(btn => {
    btn.onclick = () => deleteMessage(btn.getAttribute('data-id'));
  });
  loadConversations();
}

async function deleteMessage(id) {
  if (!confirm('Удалить это сообщение у всех?')) return;
  try {
    await api('/api/messages/single/' + encodeURIComponent(id), { method: 'DELETE' });
    await loadMessages();
  } catch (e) {
    alert(e.message);
  }
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  try {
    await api('/api/messages', { method: 'POST', body: JSON.stringify({ to: peer, text }) });
    await loadMessages();
    await loadConversations();
  } catch (e) {
    alert(e.message);
  }
}

if (token && me) {
  api('/api/me').then(() => renderMain()).catch(() => {
    localStorage.removeItem('token');
    localStorage.removeItem('me');
    token = null; me = null;
    renderAuth();
  });
} else {
  renderAuth();
}

const modalOverlay = document.getElementById('modal-overlay');
document.getElementById('logo-btn').addEventListener('click', () => modalOverlay.classList.add('open'));
document.getElementById('logo-btn').addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') modalOverlay.classList.add('open'); });
document.getElementById('modal-close-btn').addEventListener('click', () => modalOverlay.classList.remove('open'));
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) modalOverlay.classList.remove('open'); });

const searchOverlay = document.getElementById('search-modal-overlay');
const searchInput = document.getElementById('search-peer-input');
const searchError = document.getElementById('search-error');

function openSearchModal() {
  if (!token) return;
  searchInput.value = '';
  searchError.textContent = '';
  searchOverlay.classList.add('open');
  setTimeout(() => searchInput.focus(), 0);
}
function closeSearchModal() {
  searchOverlay.classList.remove('open');
}

document.getElementById('search-btn').addEventListener('click', openSearchModal);
document.getElementById('search-close-btn').addEventListener('click', closeSearchModal);
searchOverlay.addEventListener('click', e => { if (e.target === searchOverlay) closeSearchModal(); });

async function submitSearch() {
  const v = searchInput.value.trim().toLowerCase();
  if (!v) return;
  if (v === me) {
    searchError.textContent = 'Это же вы :)';
    return;
  }
  try {
    const users = await api('/api/users');
    if (!users.includes(v)) {
      searchError.textContent = 'Такой пользователь не найден.';
      return;
    }
    peer = v;
    closeSearchModal();
    startChat();
  } catch (e) {
    searchError.textContent = e.message;
  }
}
document.getElementById('search-open-btn').addEventListener('click', submitSearch);
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitSearch(); });
</script>
</body>
</html>
