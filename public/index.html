<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Простой мессенджер</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }

  :root {
    --bottom-nav-h: 90px;
    --bg1: #ff9de2; --bg2: #a78bfa; --bg3: #60a5fa;
    --accent1: #a259ff; --accent2: #ff6fb0;
    --card-bg: #ffffff;
    --pane-bg: #fdf6ff;
    --text-main: #3d1e6d;
    --text-muted: #8b7aa8;
    --input-bg: #fbf7ff;
    --input-border: #eee0fb;
    --bubble-theirs-bg: #ffffff;
    --bubble-theirs-text: #3d1e6d;
    --conv-accent: #ff8ac4;
    --chip-bg: #f1e9ff;
    --chip-text: #6b3fa0;
    --danger-bg: #fdeef4;
    --danger-text: #d6336c;
    --header-btn-bg: rgba(255,255,255,0.18);
    --header-btn-bg-hover: rgba(255,255,255,0.28);
    --rail-bg: rgba(255,255,255,0.12);
    --rail-active-bg: rgba(255,255,255,0.28);
  }
  body[data-theme="ocean"] {
    --bg1: #38bdf8; --bg2: #0ea5e9; --bg3: #22d3ee;
    --accent1: #0284c7; --accent2: #22d3ee;
    --text-main: #0c3a52; --text-muted: #5b8ba3;
    --input-bg: #f0f9ff; --input-border: #d6eefc;
    --pane-bg: #f4fbff;
    --bubble-theirs-text: #0c3a52;
    --conv-accent: #38bdf8;
    --chip-bg: #e0f2fe; --chip-text: #075985;
  }
  body[data-theme="mint"] {
    --bg1: #6ee7b7; --bg2: #34d399; --bg3: #10b981;
    --accent1: #059669; --accent2: #34d399;
    --text-main: #064e3b; --text-muted: #5f9c85;
    --input-bg: #f0fdf7; --input-border: #d3f5e6;
    --pane-bg: #f2fdf8;
    --bubble-theirs-text: #064e3b;
    --conv-accent: #34d399;
    --chip-bg: #d7f8ea; --chip-text: #065f46;
  }
  body[data-theme="dark"] {
    --bg1: #1a1030; --bg2: #2b1a4a; --bg3: #1a1030;
    --accent1: #7c3aed; --accent2: #c026d3;
    --card-bg: #241a35; --pane-bg: #1e1530;
    --text-main: #f1e9ff; --text-muted: #b9a4d9;
    --input-bg: #2f2247; --input-border: #3d2d5c;
    --bubble-theirs-bg: #3a2a57; --bubble-theirs-text: #f1e9ff;
    --conv-accent: #c026d3;
    --chip-bg: #3a2a57; --chip-text: #e0d3ff;
    --danger-bg: #4a2038; --danger-text: #ff9ec4;
    --rail-bg: rgba(255,255,255,0.06);
    --rail-active-bg: rgba(255,255,255,0.14);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    margin: 0; padding: 0;
    color: var(--text-main);
    background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 42%, var(--bg3) 100%);
    background-attachment: fixed;
    height: 100vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ---------- Шапка ---------- */
  .site-header {
    display: flex; align-items: center; gap: 8px; padding: 12px 16px;
    color: #fff; flex-shrink: 0; position: relative; z-index: 40;
  }
  .logo-badge {
    width: 40px; height: 40px; border-radius: 13px;
    background: linear-gradient(135deg, #ffd166, #ff6fb0);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    flex-shrink: 0; cursor: pointer;
  }
  .logo-badge:hover { filter: brightness(1.08); }
  .logo-badge svg { width: 22px; height: 22px; }
  .site-title { font-size: 18px; font-weight: 800; text-shadow: 0 1px 4px rgba(0,0,0,0.15); margin-right: 4px; }

  .icon-btn {
    width: 40px; height: 40px; padding: 0; flex-shrink: 0;
    border-radius: 13px; background: var(--header-btn-bg); box-shadow: none;
    display: none; align-items: center; justify-content: center; position: relative;
  }
  .icon-btn.visible { display: flex; }
  .icon-btn:hover { background: var(--header-btn-bg-hover); }
  .icon-btn svg { width: 19px; height: 19px; }
  .search-btn { margin-left: auto; }

  /* Выпадающее меню трёх точек */
  .dots-menu { position: relative; }
  .dots-dropdown {
    display: none; position: absolute; top: 48px; right: 0;
    background: var(--card-bg); border-radius: 14px; padding: 8px;
    box-shadow: 0 12px 30px rgba(20,10,35,0.3); min-width: 200px; z-index: 45;
  }
  .dots-dropdown.open { display: block; }
  .dots-dropdown button {
    width: 100%; text-align: left; background: none; box-shadow: none;
    color: var(--text-main); font-weight: 600; font-size: 14px;
    padding: 10px 12px; border-radius: 10px; display: flex; align-items: center; gap: 8px;
  }
  .dots-dropdown button:hover { background: var(--chip-bg); }
  .dots-dropdown button:active { transform: none; }

  /* ---------- Общие элементы ---------- */
  input {
    width: 100%; padding: 11px 14px; margin-bottom: 12px;
    border: 2px solid var(--input-border); border-radius: 12px; font-size: 15px;
    background: var(--input-bg); color: var(--text-main);
    outline: none; transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent1); }
  button {
    width: 100%; padding: 11px 14px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 14px rgba(120, 60, 200, 0.35);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  button:hover { box-shadow: 0 6px 18px rgba(120, 60, 200, 0.45); }
  button:active { transform: scale(0.97); }
  button.secondary { background: var(--chip-bg); color: var(--chip-text); box-shadow: none; }
  .error { color: var(--danger-text); font-size: 13px; margin-top: 6px; font-weight: 600; min-height: 1px; }
  .row { display: flex; gap: 8px; }
  .row input { flex: 1; margin-bottom: 0; }
  .row button { width: auto; padding: 11px 18px; white-space: nowrap; }
  .muted { color: var(--text-muted); font-size: 13px; }

  /* ---------- Экран входа ---------- */
  .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
  .card { background: var(--card-bg); border-radius: 20px; padding: 1.5rem; box-shadow: 0 10px 35px rgba(20,10,40,0.25); max-width: 380px; width: 100%; }
  h1 { font-size: 21px; font-weight: 800; margin: 0 0 1.25rem; color: var(--text-main); }
  a.toggle { display: block; text-align: center; margin-top: 12px; font-size: 13px; color: var(--accent1); cursor: pointer; font-weight: 600; }

  #root { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

  /* ---------- Оболочка приложения ---------- */
  .app-shell { flex: 1; display: flex; min-height: 0; }

  /* Навигационная панель (рельса) */
  .nav-rail {
    background: var(--rail-bg);
    display: flex; flex-shrink: 0;
  }
  .nav-item {
    width: auto; background: none; box-shadow: none; border-radius: 14px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 6px; color: #fff; font-size: 11px; font-weight: 700;
  }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-item:hover { background: var(--header-btn-bg-hover); }
  .nav-item.active { background: var(--rail-active-bg); }

  /* ---------- Страницы ---------- */
  .app-main { flex: 1; min-width: 0; position: relative; overflow: hidden; }
  .page { position: absolute; inset: 0; display: none; }
  .page.active { display: flex; }
  @keyframes slideInRight { from { transform: translateX(28px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideInLeft { from { transform: translateX(-28px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .page-anim-right { animation: slideInRight 0.28s ease; }
  .page-anim-left { animation: slideInLeft 0.28s ease; }

  /* Страница чатов */
  .chats-page { width: 100%; }
  .chat-list-pane { display: flex; flex-direction: column; background: var(--pane-bg); min-height: 0; }
  .pane-header { padding: 16px 18px 8px; flex-shrink: 0; }
  .pane-title { font-size: 16px; font-weight: 800; color: var(--text-main); }
  .conv-list { flex: 1; overflow-y: auto; padding: 8px 12px 16px; display: flex; flex-direction: column; gap: 6px; }
  .conv-item {
    display: flex; align-items: center; justify-content: space-between; gap: 6px;
    background: var(--card-bg); border-radius: 14px; padding: 10px 14px; cursor: pointer;
    box-shadow: 0 3px 10px rgba(20,10,40,0.10);
    border-left: 4px solid var(--conv-accent);
    transition: transform 0.1s;
  }
  .conv-item:hover { transform: translateX(2px); }
  .conv-item.selected { outline: 2px solid var(--accent1); }
  .conv-item-main { flex: 1; min-width: 0; }
  .conv-name { font-size: 14px; font-weight: 800; color: var(--text-main); }

  .avatar {
    border-radius: 50%; object-fit: cover; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    color: #fff; font-weight: 800;
  }
  .avatar-sm { width: 38px; height: 38px; font-size: 14px; }
  .avatar-md { width: 44px; height: 44px; font-size: 16px; }
  .avatar-lg { width: 88px; height: 88px; font-size: 30px; }
  .conv-item { align-items: center; }
  .conv-avatar-wrap { flex-shrink: 0; }
  .avatar-edit-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 16px; }
  .avatar-edit-actions { display: flex; gap: 8px; }
  .avatar-edit-actions button { width: auto; padding: 8px 14px; font-size: 13px; }
  .conv-preview { font-size: 13px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .conv-alias-btn, .conv-delete-btn { width: auto; padding: 6px 9px; box-shadow: none; font-size: 13px; flex-shrink: 0; }
  .conv-alias-btn { background: var(--chip-bg); color: var(--chip-text); }
  .conv-delete-btn { background: var(--danger-bg); color: var(--danger-text); }
  .empty-hint { padding: 16px; color: var(--text-muted); font-size: 13px; }

  .chat-view-pane { display: flex; flex-direction: column; background: var(--card-bg); min-height: 0; }
  .chat-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 15px; font-weight: 600; text-align: center; padding: 20px; }
  .chat-header { display: flex; align-items: center; gap: 8px; padding: 14px 16px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(20,10,40,0.06); }
  .chat-back-btn { width: 36px; height: 36px; flex-shrink: 0; padding: 0; background: var(--chip-bg); color: var(--chip-text); box-shadow: none; display: none; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; }
  .chat-header .muted { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; }
  .chat-alias-btn { width: auto; padding: 6px 10px; font-size: 12px; background: var(--chip-bg); color: var(--chip-text); box-shadow: none; flex-shrink: 0; }

  .messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 14px 16px; }
  .msg { max-width: 75%; display: flex; align-items: flex-end; gap: 6px; }
  .msg.mine { align-self: flex-end; justify-content: flex-end; }
  .msg-content { max-width: 100%; }
  .bubble {
    padding: 8px 12px; border-radius: 14px; font-size: 14px;
    background: var(--bubble-theirs-bg); color: var(--bubble-theirs-text);
    box-shadow: 0 2px 6px rgba(20,10,40,0.08);
  }
  .msg.mine .bubble { background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; }
  .time { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .msg.mine .time { text-align: right; }
  .msg-delete-btn { width: auto; padding: 3px 7px; font-size: 11px; background: var(--danger-bg); color: var(--danger-text); box-shadow: none; opacity: 0.75; flex-shrink: 0; }
  .msg-delete-btn:hover { opacity: 1; }
  .chat-input-row { display: flex; gap: 8px; padding: 12px 16px; flex-shrink: 0; }
  .chat-input-row input { margin-bottom: 0; }
  .chat-input-row button { width: auto; padding: 11px 18px; }

  /* Страница профиля */
  .profile-page { flex-direction: column; background: var(--pane-bg); overflow-y: auto; }
  .profile-page-inner { max-width: 420px; width: 100%; margin: 0 auto; padding: 20px; }
  .profile-top-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .profile-top-row h1 { margin: 0; }

  /* ---------- Модалки ---------- */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(20, 10, 35, 0.5);
    align-items: center; justify-content: center; padding: 20px; z-index: 70;
  }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--card-bg); border-radius: 18px; padding: 1.5rem; max-width: 340px; width: 100%; box-shadow: 0 20px 50px rgba(20,10,35,0.4); }
  .modal-title { font-size: 18px; font-weight: 800; color: var(--text-main); margin-bottom: 12px; }
  .modal-row { margin-bottom: 8px; }
  .modal-label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
  .modal-value { font-size: 14px; color: var(--text-main); font-weight: 600; }
  .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 4px; }
  .theme-swatch { padding: 16px 8px; border-radius: 12px; color: #fff; font-weight: 700; font-size: 12px; box-shadow: none; text-shadow: 0 1px 3px rgba(0,0,0,0.4); outline: 2px solid transparent; outline-offset: 2px; }
  .theme-swatch.active { outline: 3px solid var(--text-main); }

  /* Нижняя навигационная панель (мобильный вариант, наложена поверх контента) */
  .bottom-nav {
    display: none;
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 55;
    justify-content: space-around; align-items: center;
    background: var(--card-bg); box-shadow: 0 -4px 18px rgba(20,10,40,0.18);
    padding: 8px 4px calc(8px + env(safe-area-inset-bottom, 0px));
  }
  .bottom-nav.visible { display: flex; }
  .bottom-nav-item {
    width: auto; background: none; box-shadow: none; color: var(--text-muted);
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: 700; flex: 1;
  }
  .bottom-nav-item svg { width: 21px; height: 21px; }
  .bottom-nav-item:hover { background: var(--chip-bg); }
  .bottom-nav-item.active { color: var(--accent1); }
  .bottom-nav-item:active { transform: none; }

  /* Тост */
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px);
    background: var(--text-main); color: #fff; padding: 12px 20px; border-radius: 999px;
    font-size: 13px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 80;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- Раскладка: мобильный (по умолчанию) ---------- */
  .app-shell { flex-direction: column; }
  .nav-rail { display: none; }
  .chats-page { display: flex; }
  .chat-list-pane { flex: 1; padding-bottom: 64px; }
  .chat-view-pane { display: none; flex: 1; }
  .chats-page.show-chat .chat-list-pane { display: none; }
  .chats-page.show-chat .chat-view-pane { display: flex; }
  .chat-back-btn { display: flex; }
  .conv-list { padding-bottom: calc(var(--bottom-nav-h) + 12px); }
  .chat-input-row { margin-bottom: calc(var(--bottom-nav-h) + 40px); }
  .profile-page-inner { padding-bottom: calc(var(--bottom-nav-h) + 12px); }

  /* ---------- Раскладка: десктоп ---------- */
  @media (min-width: 860px) {
    .bottom-nav { display: none !important; }

    .app-shell { flex-direction: row; }
    .nav-rail {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      width: 84px; padding-top: 20px;
    }
    .chats-page { display: flex !important; flex-direction: row; }
    .chat-list-pane { padding-bottom: 0; }
    .conv-list { padding-bottom: 16px; }
    .chat-input-row { margin-bottom: 0; }
    .profile-page-inner { padding-bottom: 20px; }
    .chat-list-pane { width: 30%; min-width: 280px; max-width: 420px; flex: none; border-right: 1px solid rgba(0,0,0,0.06); display: flex !important; }
    .chats-page.show-chat .chat-list-pane { display: flex !important; }
    .chat-view-pane { display: flex !important; flex: 1; }
    .chat-back-btn { display: none !important; }
  }
</style>
</head>
<body>
<div class="site-header">
  <div class="logo-badge" id="logo-btn" role="button" tabindex="0" aria-label="О разработчике">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 16.5C3 13 6 11 10 11H16C18.5 11 20.5 13 20.5 15.5C20.5 18 18.5 20 16 20H7C4.8 20 3 18.2 3 16.5Z" fill="#5b3a94"/>
      <path d="M6 11C6 8 8 6 11 6H14C15.5 6 16.5 7 16.5 8.5V11H6Z" fill="#7c4fc9"/>
      <circle cx="16.5" cy="15.5" r="1.1" fill="#ffd166"/>
      <circle cx="12.5" cy="15.5" r="1.1" fill="#ffd166"/>
      <circle cx="8.8" cy="15.5" r="1.1" fill="#ffd166"/>
    </svg>
  </div>
  <div class="site-title">Утюг-чат</div>
  <button class="icon-btn search-btn" id="search-btn" aria-label="Найти пользователя">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="11" cy="11" r="6.5" stroke="#fff" stroke-width="2"/>
      <line x1="15.8" y1="15.8" x2="20.5" y2="20.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>
  <div class="icon-btn dots-menu" id="dots-menu">
    <button class="icon-btn visible" id="dots-btn" aria-label="Ещё" style="background:transparent;">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="5.5" r="1.6" fill="#fff"/>
        <circle cx="12" cy="12" r="1.6" fill="#fff"/>
        <circle cx="12" cy="18.5" r="1.6" fill="#fff"/>
      </svg>
    </button>
    <div class="dots-dropdown" id="dots-dropdown">
      <button id="dots-theme-btn"> Тема оформления</button>
      <button id="dots-favorites-btn"> Избранное</button>
      <button id="dots-night-btn"> Ночная тема</button>
    </div>
  </div>
</div>

<div id="root"></div>

<div class="bottom-nav" id="bottom-nav">
  <button class="bottom-nav-item" data-page="chats">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 5h16v11H8l-4 4V5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
    Чаты
  </button>
  <button class="bottom-nav-item" data-page="settings">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="2.8" stroke="currentColor" stroke-width="2"/><path d="M12 4V6.2M12 17.8V20M20 12H17.8M6.2 12H4M17.3 6.7L15.7 8.3M8.3 15.7L6.7 17.3M17.3 17.3L15.7 15.7M8.3 8.3L6.7 6.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    Настройки
  </button>
  <button class="bottom-nav-item" data-page="contacts">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="9" cy="8" r="3" stroke="currentColor" stroke-width="2"/><path d="M3 19c0-3 2.7-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="17" cy="8" r="2.4" stroke="currentColor" stroke-width="1.6"/><path d="M15.5 14c2.6.3 4.5 2 4.5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    Контакты
  </button>
  <button class="bottom-nav-item" data-page="profile">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="8.5" r="3.2" stroke="currentColor" stroke-width="2"/><path d="M5 19c0-3.3 3.1-5.5 7-5.5s7 2.2 7 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    Профиль
  </button>
</div>

<div id="toast" class="toast"></div>

<div id="modal-overlay" class="modal-overlay">
  <div class="modal-box">

<script>
const root = document.getElementById('root');
const API = '';
let token = localStorage.getItem('token') || null;
let me = localStorage.getItem('me') || null;
let myNickname = null;
let myAvatar = null;
let peer = '';
let currentPeerAlias = null;
let currentPeerNickname = null;
let currentAliasTarget = null;
let pollTimer = null;
let mode = 'login';
let currentPage = 'chats';
let lastNonDarkTheme = localStorage.getItem('lastNonDarkTheme') || 'pink';

function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function api(path, options = {}) {
  const headers = Object.assign({ 'Content-Type': 'application/json' }, options.headers || {});
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, Object.assign({}, options, { headers }));
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Ошибка запроса');
  return data;
}

function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ---------- Темы ----------
function applyTheme(key) {
  document.body.setAttribute('data-theme', key);
  localStorage.setItem('theme', key);
  if (key !== 'dark') { lastNonDarkTheme = key; localStorage.setItem('lastNonDarkTheme', key); }
  document.querySelectorAll('.theme-swatch').forEach(b => b.classList.toggle('active', b.getAttribute('data-theme') === key));
}
applyTheme(localStorage.getItem('theme') || 'pink');
document.querySelectorAll('.theme-swatch').forEach(btn => {
  btn.addEventListener('click', () => applyTheme(btn.getAttribute('data-theme')));
});

function setHeaderButtonsVisible(visible) {
  ['search-btn', 'dots-menu', 'bottom-nav'].forEach(id => {
    document.getElementById(id).classList.toggle('visible', visible);
  });
  if (visible) setTimeout(measureBottomNavHeight, 0);
}

// ---------- Вход / регистрация ----------
function renderAuth(errorMsg) {
  setHeaderButtonsVisible(false);
  const isRegister = mode === 'register';
  root.innerHTML = `
    <div class="auth-wrap">
      <div class="card">
        <h1>${isRegister ? 'Регистрация' : 'Вход'}</h1>
        <input id="username" placeholder="имя пользователя" autocomplete="username" />
        <input id="password" type="password" placeholder="пароль" autocomplete="${isRegister ? 'new-password' : 'current-password'}" />
        <button id="submit-btn">${isRegister ? 'Зарегистрироваться' : 'Войти'}</button>
        ${errorMsg ? `<div class="error">${esc(errorMsg)}</div>` : ''}
        <a class="toggle" id="toggle-link">${isRegister ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Зарегистрироваться'}</a>
      </div>
    </div>
  `;
  document.getElementById('toggle-link').onclick = () => { mode = isRegister ? 'login' : 'register'; renderAuth(); };
  document.getElementById('submit-btn').onclick = submitAuth;
  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });
}

async function submitAuth() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  try {
    const data = await api(mode === 'register' ? '/api/register' : '/api/login', {
      method: 'POST', body: JSON.stringify({ username, password })
    });
    token = data.token; me = data.username;
    localStorage.setItem('token', token);
    localStorage.setItem('me', me);
    try { const meInfo = await api('/api/me'); myNickname = meInfo.nickname; myAvatar = meInfo.avatar; } catch (e) { myNickname = null; myAvatar = null; }
    currentPage = 'chats';
    renderApp();
  } catch (e) {
    renderAuth(e.message);
  }
}

function logout() {
  if (pollTimer) clearInterval(pollTimer);
  localStorage.removeItem('token');
  localStorage.removeItem('me');
  token = null; me = null; peer = ''; myNickname = null;
  renderAuth();
}

// ---------- Оболочка приложения ----------
function renderApp() {
  setHeaderButtonsVisible(true);
  root.innerHTML = `
    <div class="app-shell">
      <nav class="nav-rail" id="nav-rail">
        <button class="nav-item" data-page="chats" title="Чаты">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 5h16v11H8l-4 4V5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          Чаты
        </button>
        <button class="nav-item" data-page="settings" title="Настройки">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="2.8" stroke="currentColor" stroke-width="2"/><path d="M12 4V6.2M12 17.8V20M20 12H17.8M6.2 12H4M17.3 6.7L15.7 8.3M8.3 15.7L6.7 17.3M17.3 17.3L15.7 15.7M8.3 8.3L6.7 6.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          Настройки
        </button>
        <button class="nav-item" data-page="contacts" title="Контакты">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3" stroke="currentColor" stroke-width="2"/><path d="M3 19c0-3 2.7-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="17" cy="8" r="2.4" stroke="currentColor" stroke-width="1.6"/><path d="M15.5 14c2.6.3 4.5 2 4.5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          Контакты
        </button>
        <button class="nav-item" data-page="profile" title="Профиль">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8.5" r="3.2" stroke="currentColor" stroke-width="2"/><path d="M5 19c0-3.3 3.1-5.5 7-5.5s7 2.2 7 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Профиль
        </button>
      </nav>
      <main class="app-main">
        <section class="page chats-page" id="page-chats">
          <div class="chat-list-pane" id="chat-list-pane">
            <div class="pane-header"><div class="pane-title">Чаты</div></div>
            <div id="conv-list" class="conv-list"></div>
          </div>
          <div class="chat-view-pane" id="chat-view-pane">
            <div class="chat-placeholder" id="chat-placeholder">Выберите чат, чтобы написать</div>
          </div>
        </section>
        <section class="page profile-page" id="page-profile">
          <div class="profile-page-inner">
            <div class="profile-top-row">
              <button class="chat-back-btn" id="profile-back-btn" style="display:flex;">←</button>
              <h1>Профиль</h1>
            </div>
            <div class="avatar-edit-wrap">
              <div id="avatar-preview"></div>
              <input type="file" id="avatar-file-input" accept="image/*" style="display:none;" />
              <div class="avatar-edit-actions">
                <button type="button" id="avatar-choose-btn" class="secondary">Загрузить фото</button>
                <button type="button" id="avatar-remove-btn" class="secondary">Убрать</button>
              </div>
              <div id="avatar-error" class="error"></div>
            </div>
            <div class="modal-row">
              <span class="modal-label">Логин (для входа)</span>
              <span class="modal-value" id="profile-username-display"></span>
            </div>
            <input id="nickname-input" placeholder="Ваш ник (видят другие)" style="margin-top:10px;" />
            <div id="profile-error" class="error"></div>
            <button id="profile-save-btn">Сохранить ник</button>
            <button id="profile-logout-btn" class="secondary" style="margin-top:10px;">Выйти из аккаунта</button>
          </div>
        </section>
      </main>
    </div>
  `;
  bindNavHandlers();
  goToPage('chats', false);
  loadConversations();
  if (peer) openChat(peer); else showChatPlaceholder();
}

function bindNavHandlers() {
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.onclick = () => handleNavClick(btn.getAttribute('data-page'));
  });
  document.getElementById('profile-back-btn').onclick = () => goToPage('chats');
  document.getElementById('profile-save-btn').onclick = saveProfile;
  document.getElementById('profile-logout-btn').onclick = logout;
  document.getElementById('nickname-input').addEventListener('keydown', e => { if (e.key === 'Enter') saveProfile(); });

  document.getElementById('avatar-choose-btn').onclick = () => document.getElementById('avatar-file-input').click();
  document.getElementById('avatar-file-input').addEventListener('change', handleAvatarFile);
  document.getElementById('avatar-remove-btn').onclick = removeAvatar;
}

function handleNavClick(pageName) {
  if (pageName === 'settings' || pageName === 'contacts') {
    showToast('Всё ещё в разработке 🛠️');
    return;
  }
  goToPage(pageName);
}

function goToPage(pageName, animate = true) {
  currentPage = pageName;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.getAttribute('data-page') === pageName));
  updateBottomNavActive(pageName);
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active', 'page-anim-right', 'page-anim-left'));
  const target = document.getElementById('page-' + pageName);
  if (!target) return;
  target.classList.add('active');
  if (animate) target.classList.add('page-anim-right');

  if (pageName === 'profile') {
    document.getElementById('profile-username-display').textContent = me;
    document.getElementById('nickname-input').value = myNickname || '';
    document.getElementById('profile-error').textContent = '';
    document.getElementById('avatar-error').textContent = '';
    renderAvatarPreview();
  }
}

function renderAvatarPreview() {
  const el = document.getElementById('avatar-preview');
  if (!el) return;
  el.innerHTML = avatarHtml(myAvatar, myNickname || me, 'avatar-lg');
}

// ---------- Нижняя навигация (мобильный) ----------
const bottomNav = document.getElementById('bottom-nav');
bottomNav.querySelectorAll('.bottom-nav-item').forEach(btn => {
  btn.addEventListener('click', () => handleNavClick(btn.getAttribute('data-page')));
});
function updateBottomNavActive(pageName) {
  bottomNav.querySelectorAll('.bottom-nav-item').forEach(b => b.classList.toggle('active', b.getAttribute('data-page') === pageName));
}

function measureBottomNavHeight() {
  // отключено: полагаемся на фиксированный запас в CSS (--bottom-nav-h)
}
window.addEventListener('resize', measureBottomNavHeight);
window.addEventListener('orientationchange', () => setTimeout(measureBottomNavHeight, 150));

// ---------- Профиль ----------
function resizeImageToDataUrl(file, maxSize) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Не удалось прочитать файл.'));
    reader.onload = () => { img.src = reader.result; };
    img.onerror = () => reject(new Error('Файл не похож на картинку.'));
    img.onload = () => {
      let { width, height } = img;
      if (width > height) { if (width > maxSize) { height = Math.round(height * (maxSize / width)); width = maxSize; } }
      else { if (height > maxSize) { width = Math.round(width * (maxSize / height)); height = maxSize; } }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', 0.82));
    };
    reader.readAsDataURL(file);
  });
}

async function handleAvatarFile(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const errorEl = document.getElementById('avatar-error');
  errorEl.textContent = '';
  if (!file.type.startsWith('image/')) { errorEl.textContent = 'Нужен файл картинки.'; return; }
  try {
    const dataUrl = await resizeImageToDataUrl(file, 200);
    const data = await api('/api/profile', { method: 'PATCH', body: JSON.stringify({ avatar: dataUrl }) });
    myAvatar = data.avatar;
    renderAvatarPreview();
    loadConversations();
    showToast('Аватарка обновлена');
  } catch (err) {
    errorEl.textContent = err.message;
  }
}

async function removeAvatar() {
  try {
    const data = await api('/api/profile', { method: 'PATCH', body: JSON.stringify({ avatar: null }) });
    myAvatar = data.avatar;
    renderAvatarPreview();
    loadConversations();
    showToast('Аватарка убрана');
  } catch (err) {
    document.getElementById('avatar-error').textContent = err.message;
  }
}

async function saveProfile() {
  try {
    const nickname = document.getElementById('nickname-input').value.trim();
    const data = await api('/api/profile', { method: 'PATCH', body: JSON.stringify({ nickname }) });
    myNickname = data.nickname;
    showToast('Ник сохранён');
    loadConversations();
  } catch (e) {
    document.getElementById('profile-error').textContent = e.message;
  }
}

// ---------- Чаты: список ----------
function avatarHtml(avatarUrl, name, sizeClass) {
  if (avatarUrl) {
    return `<img class="avatar ${sizeClass}" src="${avatarUrl}" alt="" />`;
  }
  const letter = (name || '?').trim().charAt(0).toUpperCase() || '?';
  return `<div class="avatar ${sizeClass}">${esc(letter)}</div>`;
}

async function loadConversations() {
  const box = document.getElementById('conv-list');
  if (!box) return;
  let list = [];
  try { list = await api('/api/conversations'); } catch (e) { return; }

  if (!list.length) {
    box.innerHTML = '<div class="empty-hint">Переписок пока нет — начните новый чат через лупу вверху, или откройте "Избранное" в меню "⋮".</div>';
    return;
  }

  box.innerHTML = list.map(c => {
    const isFavorites = c.username === me;
    const name = isFavorites ? '⭐ Избранное' : (c.alias || c.nickname || c.username);
    const avatar = isFavorites ? null : c.avatar;
    return `
    <div class="conv-item ${c.username === peer ? 'selected' : ''}" data-u="${esc(c.username)}" data-alias="${esc(c.alias || '')}">
      <div class="conv-avatar-wrap">${isFavorites ? '<div class="avatar avatar-sm">⭐</div>' : avatarHtml(avatar, name, 'avatar-sm')}</div>
      <div class="conv-item-main">
        <div class="conv-name">${esc(name)}</div>
        <div class="conv-preview">${c.lastFromMe && !isFavorites ? 'Вы: ' : ''}${esc(c.lastText)}</div>
      </div>
      <div class="conv-actions">
        ${isFavorites ? '' : `<button class="conv-alias-btn" data-u="${esc(c.username)}" title="Подписать для себя">✎</button>`}
        <button class="conv-delete-btn" data-u="${esc(c.username)}" title="Удалить чат">✕</button>
      </div>
    </div>`;
  }).join('');

  box.querySelectorAll('.conv-item-main').forEach(el => {
    el.onclick = () => openChat(el.closest('.conv-item').getAttribute('data-u'));
  });
  box.querySelectorAll('.conv-delete-btn').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); deleteConversation(btn.getAttribute('data-u')); };
  });
  box.querySelectorAll('.conv-alias-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const item = btn.closest('.conv-item');
      openAliasModal(item.getAttribute('data-u'), item.getAttribute('data-alias'));
    };
  });
}

async function deleteConversation(withUser) {
  if (!confirm('Удалить весь чат с "' + withUser + '"? Это удалит переписку у обеих сторон.')) return;
  try {
    await api('/api/conversations/' + encodeURIComponent(withUser), { method: 'DELETE' });
    if (peer === withUser) { peer = ''; if (pollTimer) clearInterval(pollTimer); showChatPlaceholder(); }
    await loadConversations();
  } catch (e) { alert(e.message); }
}

function showChatPlaceholder() {
  document.getElementById('chat-view-pane').innerHTML = '<div class="chat-placeholder">Выберите чат, чтобы написать</div>';
  document.getElementById('page-chats').classList.remove('show-chat');
}

// ---------- Чаты: открытая переписка ----------
async function openChat(username) {
  peer = username;
  goToPage('chats', false);
  document.getElementById('page-chats').classList.add('show-chat');
  if (pollTimer) clearInterval(pollTimer);

  const pane = document.getElementById('chat-view-pane');
  const isFavorites = peer === me;

  let displayName;
  let peerAvatar = null;
  currentPeerAlias = null; currentPeerNickname = null;

  if (isFavorites) {
    displayName = '⭐ Избранное';
  } else {
    try {
      const [profile, contact] = await Promise.all([
        api('/api/profile/' + encodeURIComponent(peer)),
        api('/api/contacts/' + encodeURIComponent(peer))
      ]);
      currentPeerNickname = profile.nickname;
      currentPeerAlias = contact.alias;
      peerAvatar = profile.avatar;
      displayName = currentPeerAlias || currentPeerNickname || peer;
    } catch (e) {
      pane.innerHTML = `<div class="chat-placeholder">${esc(e.message)}</div>`;
      return;
    }
  }

  pane.innerHTML = `
    <div class="chat-header">
      <button class="chat-back-btn" id="chat-back-btn">←</button>
      ${isFavorites ? '<div class="avatar avatar-sm">⭐</div>' : avatarHtml(peerAvatar, displayName, 'avatar-sm')}
      <span class="muted">Чат с <b id="chat-peer-name" style="color:var(--text-main);">${esc(displayName)}</b></span>
      ${isFavorites ? '' : '<button class="chat-alias-btn" id="chat-alias-btn">✎ подпись</button>'}
    </div>
    <div class="messages" id="messages"></div>
    <div class="chat-input-row">
      <input id="msg-input" placeholder="Написать сообщение..." />
      <button id="send-btn">Отправить</button>
    </div>
  `;
  document.getElementById('chat-back-btn').onclick = () => { peer = ''; showChatPlaceholder(); loadConversations(); };
  document.getElementById('send-btn').onclick = sendMessage;
  document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  if (!isFavorites) document.getElementById('chat-alias-btn').onclick = () => openAliasModal(peer, currentPeerAlias);

  await loadMessages();
  pollTimer = setInterval(loadMessages, 2500);
  loadConversations();
}

async function loadMessages() {
  const box = document.getElementById('messages');
  if (!box) return;
  let list = [];
  try { list = await api('/api/messages/' + encodeURIComponent(peer)); } catch (e) { return; }
  box.innerHTML = list.map(m => {
    const mine = m.from === me;
    const delBtn = mine ? `<button class="msg-delete-btn" data-id="${esc(m.id)}" title="Удалить сообщение">✕</button>` : '';
    return `<div class="msg ${mine ? 'mine' : ''}">
      ${delBtn}
      <div class="msg-content">
        <div class="bubble">${esc(m.text)}</div>
        <div class="time">${new Date(m.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
      </div>
    </div>`;
  }).join('');
  box.scrollTop = box.scrollHeight;
  box.querySelectorAll('.msg-delete-btn').forEach(btn => { btn.onclick = () => deleteMessage(btn.getAttribute('data-id')); });
}

async function deleteMessage(id) {
  if (!confirm('Удалить это сообщение у всех?')) return;
  try { await api('/api/messages/single/' + encodeURIComponent(id), { method: 'DELETE' }); await loadMessages(); }
  catch (e) { alert(e.message); }
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  try {
    await api('/api/messages', { method: 'POST', body: JSON.stringify({ to: peer, text }) });
    await loadMessages();
    await loadConversations();
  } catch (e) { alert(e.message); }
}

// ---------- Инициализация ----------
if (token && me) {
  api('/api/me').then(data => { myNickname = data.nickname; myAvatar = data.avatar; renderApp(); }).catch(() => {
    localStorage.removeItem('token'); localStorage.removeItem('me');
    token = null; me = null; renderAuth();
  });
} else {
  renderAuth();
}

  setTimeout(() => searchInput.focus(), 0);
}
function closeSearchModal() { searchOverlay.classList.remove('open'); }
document.getElementById('search-btn').addEventListener('click', openSearchModal);
document.getElementById('search-close-btn').addEventListener('click', closeSearchModal);
searchOverlay.addEventListener('click', e => { if (e.target === searchOverlay) closeSearchModal(); });
async function submitSearch() {
  const v = searchInput.value.trim().toLowerCase();
  if (!v) return;
  if (v === me) { closeSearchModal(); openChat(me); return; }
  try {
    const usersList = await api('/api/users');
    if (!usersList.includes(v)) { searchError.textContent = 'Такой пользователь не найден.'; return; }
    closeSearchModal();
    openChat(v);
  } catch (e) { searchError.textContent = e.message; }
}
document.getElementById('search-open-btn').addEventListener('click', submitSearch);
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitSearch(); });

// ---------- Меню "три точки" ----------
const dotsBtn = document.getElementById('dots-btn');
const dotsDropdown = document.getElementById('dots-dropdown');
dotsBtn.addEventListener('click', (e) => { e.stopPropagation(); dotsDropdown.classList.toggle('open'); });
document.addEventListener('click', () => dotsDropdown.classList.remove('open'));
dotsDropdown.addEventListener('click', e => e.stopPropagation());

const settingsOverlay = document.getElementById('settings-modal-overlay');
document.getElementById('dots-theme-btn').addEventListener('click', () => {
  dotsDropdown.classList.remove('open');
  settingsOverlay.classList.add('open');
});
document.getElementById('settings-close-btn').addEventListener('click', () => settingsOverlay.classList.remove('open'));
settingsOverlay.addEventListener('click', e => { if (e.target === settingsOverlay) settingsOverlay.classList.remove('open'); });

document.getElementById('dots-favorites-btn').addEventListener('click', () => {
  dotsDropdown.classList.remove('open');
  if (!token) return;
  openChat(me);
});

document.getElementById('dots-night-btn').addEventListener('click', () => {
  dotsDropdown.classList.remove('open');
  const current = document.body.getAttribute('data-theme') || 'pink';
  if (current === 'dark') applyTheme(lastNonDarkTheme || 'pink');
  else applyTheme('dark');
});

// ---------- Модалка подписи для контакта ----------
const aliasOverlay = document.getElementById('alias-modal-overlay');
const aliasInput = document.getElementById('alias-input');
const aliasError = document.getElementById('alias-error');
function openAliasModal(username, currentAlias) {
  currentAliasTarget = username;
  document.getElementById('alias-target-label').textContent = 'Собеседник: ' + username;
  aliasInput.value = currentAlias || '';
  aliasError.textContent = '';
  aliasOverlay.classList.add('open');
  setTimeout(() => aliasInput.focus(), 0);
}
function closeAliasModal() { aliasOverlay.classList.remove('open'); }
document.getElementById('alias-close-btn').addEventListener('click', closeAliasModal);
aliasOverlay.addEventListener('click', e => { if (e.target === aliasOverlay) closeAliasModal(); });
async function saveAlias() {
  try {
    const alias = aliasInput.value.trim();
    await api('/api/contacts/' + encodeURIComponent(currentAliasTarget), { method: 'PATCH', body: JSON.stringify({ alias }) });
    closeAliasModal();
    await loadConversations();
    if (peer === currentAliasTarget) {
      currentPeerAlias = alias || null;
      const nameEl = document.getElementById('chat-peer-name');
      if (nameEl) nameEl.textContent = currentPeerAlias || currentPeerNickname || peer;
    }
  } catch (e) { aliasError.textContent = e.message; }
}
document.getElementById('alias-save-btn').addEventListener('click', saveAlias);
aliasInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveAlias(); });
</script>
